<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Despensa</title>
    <!-- Tailwind CSS para um design limpo e moderno -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen flex flex-col justify-between">

    <!-- TELA DE LOGIN -->
    <div id="loginScreen" class="flex items-center justify-center min-h-screen">
        <div class="bg-white p-8 rounded-lg shadow-md w-96">
            <h2 class="text-2xl font-bold mb-6 text-center text-gray-800">Login - Despensa</h2>
            <div class="mb-4">
                <label class="block text-gray-700 text-sm font-bold mb-2">E-mail</label>
                <input type="email" id="loginEmail" class="w-full p-2 border rounded focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>
            <div class="mb-6">
                <label class="block text-gray-700 text-sm font-bold mb-2">Senha</label>
                <input type="password" id="loginPassword" class="w-full p-2 border rounded focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>
            <button id="btnLogin" class="w-full bg-blue-600 text-white p-2 rounded hover:bg-blue-700 font-bold transition">Entrar</button>
            <p id="loginError" class="text-red-500 text-sm mt-3 text-center hidden"></p>
        </div>
    </div>

    <!-- PAINEL PRINCIPAL (SISTEMA) -->
    <div id="appScreen" class="hidden min-h-screen flex flex-col">
        <!-- Barra de Navegação -->
        <nav class="bg-blue-600 text-white p-4 flex justify-between items-center shadow-md">
            <h1 class="text-xl font-bold">Controle de Despensa</h1>
            <div class="flex items-center gap-4">
                <span id="userEmailDisplay" class="text-sm bg-blue-700 px-3 py-1 rounded"></span>
                <button id="btnLogout" class="bg-red-500 hover:bg-red-600 px-3 py-1 rounded text-sm font-bold transition">Sair</button>
            </div>
        </nav>

        <main class="p-6 max-w-4xl mx-auto w-full flex-grow">
            <!-- Formulário de Entrada de Materiais -->
            <div class="bg-white p-6 rounded-lg shadow-md mb-6">
                <h2 class="text-lg font-bold mb-4 text-gray-800">Registrar Entrada de Materiais</h2>
                
                <form id="materialForm">
                    <!-- Container das linhas de materiais -->
                    <div id="materialsContainer" class="space-y-3">
                        <!-- Primeira Linha de Material (Padrão) -->
                        <div class="flex gap-3 item-row items-end">
                            <div class="flex-1">
                                <label class="block text-xs font-bold text-gray-600 mb-1">Nome do Material</label>
                                <input type="text" required class="w-full p-2 border rounded input-nome" placeholder="Ex: Arroz 5kg">
                            </div>
                            <div class="w-24">
                                <label class="block text-xs font-bold text-gray-600 mb-1">Qtd</label>
                                <input type="number" required min="1" class="w-full p-2 border rounded input-qtd" placeholder="1">
                            </div>
                            <!-- Espaço reservado para alinhar com o botão de remover das outras linhas -->
                            <div class="w-10"></div>
                        </div>
                    </div>

                    <!-- Botões de Ação do Formulário -->
                    <div class="flex justify-between items-center mt-4 pt-4 border-t border-gray-100">
                        <button type="button" id="btnAddRow" class="text-blue-600 hover:text-blue-800 font-bold text-sm flex items-center gap-1">
                            ➕ Adicionar mais um material
                        </button>
                        <button type="submit" class="bg-green-600 hover:bg-green-700 text-white px-6 py-2 rounded font-bold transition">
                            Gravar Todos
                        </button>
                    </div>
                </form>
            </div>

            <!-- Tabela de Itens em Estoque -->
            <div class="bg-white p-6 rounded-lg shadow-md">
                <h2 class="text-lg font-bold mb-4 text-gray-800">Itens em Estoque</h2>
                <div class="overflow-x-auto">
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <tr class="bg-gray-100 text-gray-700 text-sm font-bold border-b">
                                <th class="p-3">Material</th>
                                <th class="p-3 w-32">Quantidade</th>
                                <th class="p-3 w-48">Adicionado por</th>
                            </tr>
                        </thead>
                        <tbody id="stockTableBody">
                            <!-- Preenchido via banco de dados -->
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <!-- SCRIPTS DO FIREBASE -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { 
            getAuth, 
            signInWithEmailAndPassword, 
            signOut, 
            onAuthStateChanged,
            setPersistence,
            browserSessionPersistence 
        } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { 
            getDatabase, 
            ref, 
            push, 
            onValue 
        } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        // ==========================================
        // CONFIGURAÇÃO DO FIREBASE (Substitua pelos seus dados!)
        // ==========================================
        const firebaseConfig = {
  apiKey: "AIzaSyBPFr8ruaZUqikKgCCKlwaQh2PE-AR1Y3M",
  authDomain: "sistema-de-despensa-46dd6.firebaseapp.com",
  projectId: "sistema-de-despensa-46dd6",
  storageBucket: "sistema-de-despensa-46dd6.firebasestorage.app",
  messagingSenderId: "311759028034",
  appId: "1:311759028034:web:2adde2835d6904c45912db",
  measurementId: "G-P82BPCYH6S"
};

        // Inicializar Firebase
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);

        // Elementos da Página
        const loginScreen = document.getElementById('loginScreen');
        const appScreen = document.getElementById('appScreen');
        const btnLogin = document.getElementById('btnLogin');
        const btnLogout = document.getElementById('btnLogout');
        const userEmailDisplay = document.getElementById('userEmailDisplay');
        const materialForm = document.getElementById('materialForm');
        const materialsContainer = document.getElementById('materialsContainer');
        const btnAddRow = document.getElementById('btnAddRow');
        const stockTableBody = document.getElementById('stockTableBody');

        // ==========================================
        // 1. LOGIN COM PERSISTÊNCIA DE SESSÃO (Fecha a aba = Desloga)
        // ==========================================
        btnLogin.addEventListener('click', () => {
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            const errorElement = document.getElementById('loginError');

            errorElement.classList.add('hidden');

            setPersistence(auth, browserSessionPersistence)
                .then(() => {
                    return signInWithEmailAndPassword(auth, email, password);
                })
                .catch((error) => {
                    errorElement.textContent = "Usuário ou senha incorretos, ou acesso revogado.";
                    errorElement.classList.remove('hidden');
                    console.error("Erro de login:", error);
                });
        });

        // Evento do botão sair
        btnLogout.addEventListener('click', () => {
            signOut(auth);
        });

        // ==========================================
        // 2. CONTROLE DE ESTADO DO USUÁRIO & VERIFICAÇÃO DE BLOQUEIO
        // ==========================================
        onAuthStateChanged(auth, (user) => {
            if (user) {
                // Força a validação do token com o Firebase para garantir que o usuário não foi desativado ou deletado
                user.getIdToken(true)
                    .then(() => {
                        loginScreen.classList.add('hidden');
                        appScreen.classList.remove('hidden');
                        userEmailDisplay.textContent = user.email;
                        carregarEstoque();
                    })
                    .catch((error) => {
                        // Se o usuário foi bloqueado no console, isso falha e ele é deslogado na hora
                        console.log("Acesso revogado pelo Administrador.");
                        signOut(auth);
                    });
            } else {
                loginScreen.classList.remove('hidden');
                appScreen.classList.add('hidden');
            }
        });

        // ==========================================
        // 3. ADICIONAR MÚLTIPLOS MATERIAIS
        // ==========================================
        
        // Adiciona nova linha de inputs ao clicar no botão
        btnAddRow.addEventListener('click', () => {
            const novaLinha = document.createElement('div');
            novaLinha.className = "flex gap-3 item-row items-end mt-2";
            novaLinha.innerHTML = `
                <div class="flex-1">
                    <input type="text" required class="w-full p-2 border rounded input-nome" placeholder="Ex: Feijão 1kg">
                </div>
                <div class="w-24">
                    <input type="number" required min="1" class="w-full p-2 border rounded input-qtd" placeholder="1">
                </div>
                <div class="w-10 flex justify-center pb-2">
                    <button type="button" class="text-red-500 hover:text-red-700 text-2xl font-bold p-1 leading-none" onclick="this.closest('.item-row').remove()">&times;</button>
                </div>
            `;
            materialsContainer.appendChild(novaLinha);
        });

        // Envia todos os materiais adicionados de uma vez
        materialForm.addEventListener('submit', (e) => {
            e.preventDefault();

            const linhas = document.querySelectorAll('.item-row');
            const currentUser = auth.currentUser;

            if (!currentUser) return;

            // Varre as linhas e faz o envio de cada uma delas
            linhas.forEach((linha) => {
                const nome = linha.querySelector('.input-nome').value.trim();
                const quantidade = parseInt(linha.querySelector('.input-qtd').value);

                if (nome && quantidade > 0) {
                    push(ref(db, 'estoque'), {
                        nome: nome,
                        quantidade: quantidade,
                        usuario: currentUser.email,
                        dataRegistro: new Date().toISOString()
                    });
                }
            });

            // Reseta o formulário limpando as linhas extras e voltando ao estado inicial
            materialsContainer.innerHTML = `
                <div class="flex gap-3 item-row items-end">
                    <div class="flex-1">
                        <label class="block text-xs font-bold text-gray-600 mb-1">Nome do Material</label>
                        <input type="text" required class="w-full p-2 border rounded input-nome" placeholder="Ex: Arroz 5kg">
                    </div>
                    <div class="w-24">
                        <label class="block text-xs font-bold text-gray-600 mb-1">Qtd</label>
                        <input type="number" required min="1" class="w-full p-2 border rounded input-qtd" placeholder="1">
                    </div>
                    <div class="w-10"></div>
                </div>
            `;
            
            alert("Todos os materiais foram inseridos com sucesso!");
        });

        // ==========================================
        // 4. CARREGAR ITENS DO ESTOQUE
        // ==========================================
        function carregarEstoque() {
            const estoqueRef = ref(db, 'estoque');
            onValue(estoqueRef, (snapshot) => {
                stockTableBody.innerHTML = '';
                const data = snapshot.val();
                
                if (data) {
                    Object.keys(data).forEach((key) => {
                        const item = data[key];
                        const row = `
                            <tr class="border-b hover:bg-gray-50 text-gray-700 text-sm">
                                <td class="p-3 font-semibold">${item.nome}</td>
                                <td class="p-3">${item.quantidade}</td>
                                <td class="p-3 text-gray-500 text-xs">${item.usuario || 'Anônimo'}</td>
                            </tr>
                        `;
                        stockTableBody.insertAdjacentHTML('afterbegin', row); // Insere os mais novos no topo
                    });
                } else {
                    stockTableBody.innerHTML = `<tr><td colspan="3" class="p-4 text-center text-gray-500">Nenhum item em estoque.</td></tr>`;
                }
            });
        }
    </script>
</body>
</html>
